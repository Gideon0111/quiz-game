<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>
    <link rel="stylesheet" type="text/css" href="CSS/index.css">      
</head>
<body>

<div data-state="start" id="app">

  <section id="screen-start" class="screen">
    <div class=" question-card question-card--centered">
      <h1 class="start-title">🧠 Start Quiz</h1>
      <p class="start-subtitle">
      Test your knowledge of Technology, Science and History.
      </p>
      <button class="btn btn--primary" id="btn-start">
          Select Category
      </button>
    </div>
  </section>

  <section id="category-screen" class="screen">
      <h2 class="screen-heading">Select a Category</h2>
      <div class="btn-stack">
        <button class="btn btn--primary" data-category="technology">Technology</button>
        <button class="btn btn--primary" data-category="science">Science</button>
        <button class="btn btn--primary" data-category="history">History</button>
      </div>
  </section>

  <section id="screen-question" class="screen"> 
    <!-- Progress bar + counter-->
    <div class="quiz-header">
      <span class="question-counter" id="question-counter">Question 1</span>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
      </div>
    </div>

    <!-- Question card -->
    <div class="question-card">
      <p class="course-label" id="js-course-title"></p>
      <p class="question-text" id="js-question">Loading question…</p>
      <div data-index="0" class="choices-grid" id="js-choices"></div>
    </div>

    <div class="action-row">
        <button id="back-btn" class="hidden btn btn--primary"> 
          Back
        </button>

        <button id="next-btn" class="hidden btn btn--primary">
          Next Question
        </button>

        <button id="submit-btn" class="hidden btn btn--primary">
          Submit
        </button>
    </div>

      <!-- Feedback and score -->
    <p class="feedback-text" id="result"></p>
    <p class="score-text"    id="score"></p>

  </section>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
